<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">Test Login Modal</h1>
        
        <button 
            id="loginBtn"
            class="w-full px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
        >
            Đăng nhập
        </button>

        <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white p-8 rounded-lg max-w-md w-full">
                <h2 class="text-xl font-bold mb-4">Login Modal</h2>
                <button 
                    id="closeBtn"
                    class="px-4 py-2 bg-red-500 text-white rounded"
                >
                    Đóng
                </button>
            </div>
        </div>

        <div id="log" class="mt-4 p-4 bg-gray-50 rounded">
            <p class="font-bold">Console Log:</p>
            <div id="logContent" class="text-sm text-gray-600"></div>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('closeBtn');
        const logContent = document.getElementById('logContent');

        function log(message) {
            const p = document.createElement('p');
            p.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logContent.appendChild(p);
        }

        loginBtn.addEventListener('click', () => {
            log('Nút đăng nhập được click');
            modal.classList.remove('hidden');
        });

        closeBtn.addEventListener('click', () => {
            log('Nút đóng được click');
            modal.classList.add('hidden');
        });

        log('Script đã load xong');
    </script>
</body>
</html>
