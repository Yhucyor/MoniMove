services:
  # Frontend service
  - type: web
    name: iot-monitoring-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://iot-monitoring-backend.onrender.com/api
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        value: AIzaSyBdzRJwbirlHbpK4YTOlVxKn-Sx29h8_Y0
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        value: monitoring-d6063.firebaseapp.com
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        value: monitoring-d6063
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: monitoring-d6063.firebasestorage.app
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: "421741487502"
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: 1:421741487502:web:961bc318911385d7b5b0df
      - key: NEXT_PUBLIC_FIREBASE_DATABASE_URL
        value: https://monitoring-d6063-default-rtdb.firebaseio.com

  # Backend service
  - type: web
    name: iot-monitoring-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: ./backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://iot-monitoring-frontend.onrender.com
      - key: FIREBASE_PROJECT_ID
        value: monitoring-d6063
      - key: FIREBASE_DATABASE_URL
        value: https://monitoring-d6063-default-rtdb.firebaseio.com
      - key: JWT_SECRET
        value: super-secret-key-production

